---
# Hugging Face token for gated model access (optional at runtime when using offline local weights).
# Replace the placeholder before applying, or create the secret manually:
#   kubectl create secret generic hf-token -n vllm --from-literal=HF_TOKEN=hf_xxx
apiVersion: v1
kind: Secret
metadata:
  name: hf-token
  namespace: vllm
type: Opaque
stringData:
  HF_TOKEN: "REPLACE_WITH_YOUR_HF_TOKEN"
